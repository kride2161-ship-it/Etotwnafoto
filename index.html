```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Маши</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            margin: 0;
            color: white;
            overflow: hidden;
            user-select: none;
        }

        .ios-transition {
            animation: iosAppear 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes iosAppear {
            from { opacity: 0; transform: scale(1.05); filter: blur(20px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .spooky-glitch {
            animation: glitch-red 0.2s infinite;
        }

        @keyframes glitch-red {
            0% { transform: translate(0); text-shadow: 2px 0 red; }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); text-shadow: -2px 0 blue; }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0); }
        }

        .bg-celebration {
            background: linear-gradient(180deg, #ffffff 0%, #f0f2f5 100%);
            color: #1d1d1f;
            min-height: 100vh;
            overflow-y: auto;
        }

        .card-perspective {
            background: white;
            border-radius: 30px;
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card-perspective:hover {
            transform: translateY(-15px) rotateX(5deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        .photo-frame {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            border-radius: 22px;
            background: #f5f5f7;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

<div id="app">
    <!-- ЭКРАН 1: ГЛАВНЫЙ -->
    <div id="screen-main" class="h-screen flex flex-col items-center justify-center p-6 text-center ios-transition">
        <h1 class="text-5xl md:text-7xl font-black mb-20 tracking-tighter italic">ТЫ ГОТОВА?</h1>
        <div class="flex flex-col sm:flex-row gap-8 w-full max-w-sm sm:max-w-none justify-center">
            <button onclick="openGallery()" class="px-16 py-5 bg-white text-black rounded-3xl font-bold text-2xl shadow-[0_0_40px_rgba(255,255,255,0.2)] active:scale-90 transition-all">ДА</button>
            <button onclick="openSpooky()" class="px-16 py-5 bg-zinc-900 text-zinc-500 rounded-3xl font-bold text-2xl border border-zinc-800 active:scale-90 transition-all">НЕТ</button>
        </div>
    </div>

    <!-- ЭКРАН 2: ПУГАЮЩИЙ -->
    <div id="screen-spooky" class="hidden h-screen flex flex-col items-center justify-center bg-black p-8 text-center">
        <div class="flex flex-col items-center space-y-10">
            <img src="https://i.postimg.cc/1njcYcp6/spooky.jpg" alt="Я слежу" class="w-72 h-96 object-cover rounded-lg border-2 border-red-900 grayscale brightness-50">
            <h2 class="text-3xl md:text-5xl font-black text-red-600 uppercase tracking-tighter spooky-glitch leading-tight">
                Я знаю где ты живёшь,<br>от меня не спрятаться
            </h2>
        </div>
    </div>

    <!-- ЭКРАН 3: ГАЛЕРЕЯ -->
    <div id="screen-gallery" class="hidden bg-celebration p-6 md:p-16">
        <div class="max-w-6xl mx-auto text-center">
            <p class="text-zinc-400 text-2xl font-medium mb-4">Я тебя не обманул.</p>
            <h1 class="text-6xl md:text-9xl font-black mb-8 tracking-tighter">С ДНЁМ РОЖДЕНИЯ!</h1>
            <div class="inline-block bg-black text-white px-10 py-4 rounded-full font-black text-3xl mb-20 shadow-2xl">
                МАША, ТЕБЕ 10 ЛЕТ! 🎂
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-12" id="photo-container">
                <!-- Контент из JS -->
            </div>
            
            <p class="mt-32 text-zinc-300 font-bold uppercase tracking-widest text-sm">Created for Masha • 2026</p>
        </div>
    </div>
</div>

<script>
    // Прямые ссылки на твои фото (формат i.postimg.cc работает на GitHub)
    const photoLinks = [
        "https://i.postimg.cc/K1cjRKK6/1.jpg",
        "https://i.postimg.cc/FYFz7ffw/2.jpg",
        "https://i.postimg.cc/BjZbX88k/3.jpg",
        "https://i.postimg.cc/ppJyWQTN/4.jpg",
        "https://i.postimg.cc/kBvDJN4d/5.jpg",
        "https://i.postimg.cc/RNLqS10s/6.jpg"
    ];

    function openGallery() {
        document.body.style.overflow = 'auto';
        document.getElementById('screen-main').classList.add('hidden');
        document.getElementById('screen-spooky').classList.add('hidden');
        const gallery = document.getElementById('screen-gallery');
        gallery.classList.remove('hidden');
        gallery.classList.add('ios-transition');

        const container = document.getElementById('photo-container');
        container.innerHTML = '';

        photoLinks.forEach((url, i) => {
            const card = document.createElement('div');
            card.className = 'card-perspective ios-transition';
            card.style.animationDelay = (i * 0.1) + 's';
            card.innerHTML = `
                <div class="photo-frame">
                    <img src="${url}" alt="Фото ${i+1}" loading="lazy">
                </div>
                <div class="p-6">
                    <h3 class="font-black text-xl uppercase italic text-zinc-300">Frame #${i+1}</h3>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function openSpooky() {
        document.getElementById('screen-main').classList.add('hidden');
        const spooky = document.getElementById('screen-spooky');
        spooky.classList.remove('hidden');
        spooky.classList.add('ios-transition');

        // Возврат через 3 секунды
        setTimeout(() => {
            spooky.classList.add('hidden');
            const main = document.getElementById('screen-main');
            main.classList.remove('hidden');
            main.classList.add('ios-transition');
        }, 3000);
    }
</script>

</body>
</html>

```
