<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b1020" />
  <title>Посмотри скорее...</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root {
      --bg-top: #11182d;
      --bg-bottom: #060914;
      --glass: rgba(255,255,255,0.08);
      --glass-strong: rgba(255,255,255,0.14);
      --border: rgba(255,255,255,0.18);
      --text: rgba(255,255,255,0.96);
      --muted: rgba(255,255,255,0.68);
      --accent: #8fb2ff;
      --accent2: #7ff0dc;
      --celebration: #ffcf5a;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-tap-highlight-color: transparent;
      background:
        radial-gradient(circle at 18% 12%, rgba(143, 178, 255, 0.22), transparent 28%),
        radial-gradient(circle at 82% 16%, rgba(127, 240, 220, 0.16), transparent 24%),
        radial-gradient(circle at 50% 92%, rgba(255, 207, 90, 0.10), transparent 26%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .app-shell {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
    }

    .decor {
      position: absolute;
      inset: -10%;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,0.09), transparent 11%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.06), transparent 12%),
        radial-gradient(circle at 20% 80%, rgba(255,255,255,0.05), transparent 10%),
        radial-gradient(circle at 80% 78%, rgba(255,255,255,0.06), transparent 12%);
      filter: blur(18px);
    }

    .fade-in {
      animation: fadeIn .75s cubic-bezier(.2,.8,.2,1) forwards;
      opacity: 0;
      transform: translateY(14px) scale(.985);
      filter: blur(8px);
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .glass {
      background: var(--glass);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px) saturate(170%);
      -webkit-backdrop-filter: blur(24px) saturate(170%);
      box-shadow:
        0 20px 60px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .glass-strong {
      background: var(--glass-strong);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      box-shadow:
        0 18px 50px rgba(0,0,0,.24),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    .hero-title {
      letter-spacing: -0.07em;
      text-wrap: balance;
    }

    .btn-ios {
      position: relative;
      overflow: hidden;
      border-radius: 9999px;
      padding: 15px 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.95);
      box-shadow:
        0 12px 30px rgba(0,0,0,.18),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    .btn-ios::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,0) 60%);
      opacity: .9;
      pointer-events: none;
    }

    .btn-ios:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.28);
      box-shadow:
        0 15px 34px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.10);
    }

    .btn-ios:active {
      transform: scale(0.97);
    }

    .btn-ios-primary {
      color: #0b1020;
      background: rgba(255,255,255,.84);
      border: 1px solid rgba(255,255,255,.38);
      box-shadow:
        0 14px 34px rgba(0,0,0,.18),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .btn-ios-primary:hover {
      background: rgba(255,255,255,.92);
    }

    .btn-ios-secondary {
      color: rgba(255,255,255,.78);
      background: rgba(255,255,255,.06);
    }

    .btn-ios-secondary:hover {
      background: rgba(255,255,255,.10);
    }

    .page-center {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .gallery-bg {
      min-height: 100vh;
      color: #10131a;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.94), transparent 36%),
        radial-gradient(circle at 15% 15%, rgba(143,178,255,.12), transparent 18%),
        radial-gradient(circle at 88% 20%, rgba(127,240,220,.12), transparent 16%),
        radial-gradient(circle at 50% 86%, rgba(255,207,90,.10), transparent 18%),
        linear-gradient(180deg, #f7faff 0%, #eef4fb 100%);
    }

    .photo-card {
      background: rgba(255,255,255,.64);
      border: 1px solid rgba(255,255,255,.70);
      border-radius: 30px;
      padding: 12px;
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      box-shadow:
        0 12px 28px rgba(15,23,42,.08),
        inset 0 1px 0 rgba(255,255,255,.28);
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }

    .photo-card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 20px 44px rgba(15,23,42,.12);
      border-color: rgba(255,255,255,.92);
    }

    .img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(135deg, #edf2f8, #f8fbff);
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .45s ease;
    }

    .photo-card:hover .img-wrap img {
      transform: scale(1.03);
    }

    .spooky-photo {
      width: min(78vw, 320px);
      height: min(104vw, 430px);
      object-fit: cover;
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,.12);
      filter: grayscale(1) contrast(1.15) saturate(.9);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 20px 70px rgba(255, 90, 120, 0.18);
    }

    .spooky-text-anim {
      animation: spookyPulse 1.35s ease-in-out infinite alternate;
    }

    @keyframes spookyPulse {
      from {
        color: rgba(255,255,255,0.96);
        text-shadow: 0 0 12px rgba(255,255,255,0.10);
      }
      to {
        color: #ff6b81;
        text-shadow: 0 0 24px rgba(255, 107, 129, 0.85);
      }
    }

    .subtle-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
    }

    .slow-float {
      animation: slowFloat 5.5s ease-in-out infinite;
    }

    @keyframes slowFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-7px); }
    }

    .hidden {
      display: none !important;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.76);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .spark {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, #fff, #ffd86b);
      box-shadow: 0 0 14px rgba(255,216,107,.65);
    }

    .gallery-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(255,255,255,.9);
      box-shadow: 0 8px 24px rgba(15,23,42,.08);
      color: #0f172a;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="decor"></div>

    <div id="screen-start" class="page-center fade-in">
      <div class="glass w-full max-w-2xl rounded-[36px] p-8 md:p-12 text-center">
        <div class="slow-float">
          <div class="badge mb-5">
            <span class="spark"></span>
            special invite
          </div>
          <h1 class="hero-title text-4xl md:text-6xl font-black leading-[0.95] mb-5">
            Ты готова?
          </h1>
          <p class="text-white/70 text-sm md:text-base max-w-xl mx-auto mb-10">
            Нажми и откроется сюрприз.
          </p>
        </div>

        <div class="subtle-line mb-8"></div>

        <div class="flex flex-col sm:flex-row gap-4 sm:gap-5 justify-center">
          <button onclick="goToGallery()" class="btn-ios btn-ios-primary">
            Да
          </button>
          <button onclick="goToSpooky()" class="btn-ios btn-ios-secondary">
            Нет
          </button>
        </div>
      </div>
    </div>

    <div id="screen-spooky" class="hidden page-center fade-in">
      <div class="glass-strong w-full max-w-3xl rounded-[36px] p-6 md:p-10 text-center">
        <div class="flex flex-col items-center gap-6">
          <img
            id="spooky-image"
            src="https://i.postimg.cc/1njcYcp6/spooky.jpg"
            alt="Страшное изображение"
            class="spooky-photo"
          />
          <div class="space-y-3">
            <p class="uppercase tracking-[0.35em] text-[10px] md:text-xs text-white/55">warning</p>
            <h2 class="spooky-text-anim text-3xl md:text-5xl font-black uppercase tracking-tighter leading-[0.95]">
              Я знаю где ты живёшь,<br />от меня не спрятаться
            </h2>
          </div>
        </div>
      </div>
    </div>

    <div id="screen-gallery" class="hidden gallery-bg">
      <div class="max-w-7xl mx-auto px-5 md:px-10 py-10 md:py-14">
        <div class="text-center mb-10 md:mb-14 fade-in">
          <div class="gallery-tag mb-5">
            <span class="spark"></span>
            birthday gallery
          </div>
          <p class="text-slate-500 text-sm md:text-base font-medium mb-3">Я тебя не обманул.</p>
          <h1 class="hero-title text-4xl md:text-7xl lg:text-8xl font-black mb-5 text-slate-950">
            С днём рождения, Маша!
          </h1>
          <div class="inline-flex items-center justify-center bg-slate-950 text-white px-6 md:px-8 py-3 md:py-4 rounded-2xl font-black text-base md:text-2xl shadow-lg rotate-1">
            С ПЕРВЫМ ЮБИЛЕЕМ! 10 ЛЕТ! 🎉
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8" id="gallery-grid"></div>

        <p class="mt-14 md:mt-20 text-center text-slate-500 italic font-medium">
          Самый добрый розыгрыш в мире ✨
        </p>
      </div>
    </div>
  </div>

  <script>
    const images = [
      "https://i.postimg.cc/tCXdcnW7/IMG-20260429-234813-589.jpg",
      "https://i.postimg.cc/9FWPkwZ9/IMG-20260429-234821-112.jpg",
      "https://i.postimg.cc/7Yx1RJ0S/IMG-20260429-234828-018.jpg",
      "https://i.postimg.cc/vHQ7Kxf9/IMG-20260429-234835-448.jpg",
      "https://i.postimg.cc/dtqRfZrr/IMG-20260429-234841-278.jpg",
      "https://i.postimg.cc/CLFC2nkH/IMG-20260429-234845-402.jpg"
    ];

    function loadImageWithFallback(img, url, fallbackText) {
      const testImage = new Image();
      let settled = false;

      const applyFallback = () => {
        if (settled) return;
        settled = true;
        img.src = `https://via.placeholder.com/900x900?text=${encodeURIComponent(fallbackText)}`;
      };

      testImage.onload = () => {
        if (settled) return;
        settled = true;
        img.src = url;
      };

      testImage.onerror = applyFallback;
      setTimeout(applyFallback, 3500);
      testImage.src = url;
    }

    function showOnly(screenId) {
      ["screen-start", "screen-spooky", "screen-gallery"].forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.add("hidden");
        el.classList.remove("fade-in");
      });

      const active = document.getElementById(screenId);
      active.classList.remove("hidden");
      active.classList.add("fade-in");
    }

    function goToGallery() {
      document.body.style.overflowY = "auto";
      showOnly("screen-gallery");

      const grid = document.getElementById("gallery-grid");
      grid.innerHTML = "";

      images.forEach((url, i) => {
        const card = document.createElement("div");
        card.className = "photo-card fade-in";
        card.style.animationDelay = `${i * 90}ms`;

        card.innerHTML = `
          <div class="img-wrap">
            <img id="img-${i}" alt="Фото ${i + 1}">
          </div>
          <div class="mt-4 px-1">
            <div class="flex items-center justify-between gap-3">
              <span class="text-slate-500 font-semibold uppercase text-[10px] tracking-[0.28em]">
                Moment #${i + 1}
              </span>
              <span class="text-slate-400 text-xs">0${i + 1}</span>
            </div>
          </div>
        `;

        grid.appendChild(card);

        const img = card.querySelector(`#img-${i}`);
        loadImageWithFallback(img, url, `Error ${i + 1}`);
      });
    }

    function goToSpooky() {
      document.body.style.overflow = "hidden";
      showOnly("screen-spooky");

      const spookyImg = document.getElementById("spooky-image");
      loadImageWithFallback(spookyImg, spookyImg.src, "Error");

      setTimeout(() => {
        document.body.style.overflowY = "auto";
        showOnly("screen-start");
      }, 3500);
    }

    document.addEventListener("DOMContentLoaded", () => {
      const spookyImg = document.getElementById("spooky-image");
      loadImageWithFallback(spookyImg, spookyImg.src, "Error");
    });
  </script>
</body>
</html>
